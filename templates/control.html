<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zotero 简报控制台</title>
  <style>
    :root { --bg:#f5f5f7; --card:#fff; --accent:#007aff; --border:#d2d2d7; --text:#1d1d1f; --muted:#86868b; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,sans-serif; background:var(--bg); color:var(--text); }
    header { background:var(--card); border-bottom:1px solid var(--border); padding:18px 24px; position:sticky; top:0; z-index:10; }
    header h1 { margin:0; font-size:1.25rem; }
    header p { margin:4px 0 0; color:var(--muted); font-size:13px; }
    main { max-width:960px; margin:0 auto; padding:20px 20px 60px; }
    .card { background:var(--card); border-radius:14px; padding:20px 22px; margin-bottom:16px; box-shadow:0 1px 8px rgba(0,0,0,.04); }
    h2 { margin:0 0 14px; font-size:1rem; }
    label { display:block; font-size:13px; color:var(--muted); margin-bottom:6px; }
    input, textarea, select { width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:10px; font-size:14px; font-family:inherit; }
    textarea { min-height:220px; resize:vertical; line-height:1.5; font-family:ui-monospace,Menlo,monospace; font-size:13px; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
    .row-3 { grid-template-columns:1fr 1fr 1fr; }
    .actions { display:flex; flex-wrap:wrap; gap:10px; margin-top:8px; }
    button { border:none; border-radius:10px; padding:10px 16px; font-size:14px; font-weight:600; cursor:pointer; }
    .btn-primary { background:var(--accent); color:#fff; }
    .btn-secondary { background:#e8e8ed; color:var(--text); }
    .btn-danger { background:#ff3b30; color:#fff; }
    .status { display:inline-block; padding:4px 10px; border-radius:999px; font-size:12px; font-weight:600; }
    .status.ok { background:#d1fae5; color:#065f46; }
    .status.bad { background:#fee2e2; color:#991b1b; }
    .schedule-list { display:flex; flex-direction:column; gap:8px; }
    .schedule-item { display:flex; gap:8px; align-items:center; }
    .schedule-item input { width:80px; }
    .hint { font-size:12px; color:var(--muted); margin-top:6px; }
    pre { background:#1e1e1e; color:#d4d4d4; padding:12px; border-radius:10px; font-size:12px; overflow:auto; max-height:180px; white-space:pre-wrap; }
    #toast { position:fixed; bottom:24px; right:24px; background:#1d1d1f; color:#fff; padding:12px 18px; border-radius:10px; display:none; font-size:14px; z-index:99; }
  </style>
</head>
<body>
  <header>
    <h1>📚 Zotero 简报控制台</h1>
    <p>项目路径：{{ project_dir }}</p>
  </header>
  <main>
    <div class="card">
      <h2>状态</h2>
      <p>
        定时任务：
        {% if launchd_loaded %}
          <span class="status ok">已加载</span>
        {% else %}
          <span class="status bad">未加载 — 保存后点「重载定时任务」</span>
        {% endif %}
      </p>
      <div class="actions">
        <button class="btn-secondary" onclick="refreshStatus()">刷新状态</button>
        <button class="btn-secondary" onclick="testNotify()">测试通知</button>
        <button class="btn-primary" onclick="runNow(false)">立即推送</button>
        <button class="btn-danger" onclick="runNow(true)">强制推送（忽略去重）</button>
      </div>
    </div>

    <div class="card">
      <h2>基本设置</h2>
      <div class="row row-3">
        <div>
          <label>优先标签</label>
          <input id="priority_tag" value="{{ config.priority_tag }}">
        </div>
        <div>
          <label>每次推送篇数</label>
          <input id="count" type="number" min="1" max="10" value="{{ config.count }}">
        </div>
        <div>
          <label>去重天数</label>
          <input id="history_days" type="number" min="1" max="90" value="{{ config.history_days }}">
        </div>
      </div>
      <div class="row">
        <div>
          <label>Markdown 总结输出路径</label>
          <input id="summaries_dir" value="{{ config.summaries_dir }}">
          <div class="hint">相对项目目录或绝对路径，如 ~/Documents/zotero-summaries</div>
        </div>
        <div>
          <label>HTML 中转页输出路径</label>
          <input id="hubs_dir" value="{{ config.hubs_dir }}">
        </div>
      </div>
    </div>

    <div class="card">
      <h2>发送时间</h2>
      <div id="schedule_list" class="schedule-list"></div>
      <div class="actions" style="margin-top:12px">
        <button class="btn-secondary" onclick="addSchedule()">+ 添加时间</button>
      </div>
      <div class="hint">修改后需保存配置，并点击「重载定时任务」才会生效</div>
    </div>

    <div class="card">
      <h2>详细总结 Prompt</h2>
      <label>DeepSeek 模型</label>
      <input id="deepseek_model" value="{{ config.deepseek_model }}" style="margin-bottom:12px">
      <label>生成 Prompt（必须包含 <code>{context}</code> 占位符，输出需为 JSON）</label>
      <textarea id="summary_prompt">{{ config.summary_prompt }}</textarea>
    </div>

    <div class="card">
      <div class="actions">
        <button class="btn-primary" onclick="saveConfig()">保存配置</button>
        <button class="btn-secondary" onclick="reloadSchedule()">重载定时任务</button>
      </div>
    </div>

    <div class="card">
      <h2>运行日志</h2>
      <label>stdout</label>
      <pre id="stdout_log">{{ stdout_log }}</pre>
      <label>stderr</label>
      <pre id="stderr_log">{{ stderr_log }}</pre>
    </div>
  </main>
  <div id="toast"></div>

  <script>
    const initialSchedule = {{ config.schedule | tojson }};

    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 3000);
    }

    function renderSchedule() {
      const list = document.getElementById('schedule_list');
      list.innerHTML = '';
      initialSchedule.forEach((slot, i) => {
        const div = document.createElement('div');
        div.className = 'schedule-item';
        div.innerHTML = `
          <input type="number" min="0" max="23" value="${slot.hour}" data-i="${i}" data-f="hour" class="sched-input"> :
          <input type="number" min="0" max="59" value="${String(slot.minute).padStart(2,'0')}" data-i="${i}" data-f="minute" class="sched-input">
          <button class="btn-secondary" onclick="removeSchedule(${i})">删除</button>`;
        list.appendChild(div);
      });
      document.querySelectorAll('.sched-input').forEach(inp => {
        inp.addEventListener('change', e => {
          const i = +e.target.dataset.i;
          initialSchedule[i][e.target.dataset.f] = +e.target.value;
        });
      });
    }

    function addSchedule() {
      initialSchedule.push({ hour: 9, minute: 0 });
      renderSchedule();
    }

    function removeSchedule(i) {
      initialSchedule.splice(i, 1);
      renderSchedule();
    }

    function gatherConfig() {
      return {
        priority_tag: document.getElementById('priority_tag').value,
        count: +document.getElementById('count').value,
        history_days: +document.getElementById('history_days').value,
        summaries_dir: document.getElementById('summaries_dir').value,
        hubs_dir: document.getElementById('hubs_dir').value,
        schedule: initialSchedule,
        summary_prompt: document.getElementById('summary_prompt').value,
        deepseek_model: document.getElementById('deepseek_model').value,
      };
    }

    async function saveConfig() {
      const res = await fetch('/api/config', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(gatherConfig()),
      });
      const data = await res.json();
      toast(data.message || '已保存');
    }

    async function reloadSchedule() {
      await saveConfig();
      const res = await fetch('/api/reload-schedule', { method: 'POST' });
      const data = await res.json();
      toast(data.message);
      setTimeout(refreshStatus, 500);
    }

    async function runNow(force) {
      toast(force ? '强制推送中…' : '推送中…');
      const res = await fetch('/api/run', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ force }),
      });
      const data = await res.json();
      toast(data.ok ? '推送完成' : '推送失败，查看日志');
      refreshStatus();
    }

    async function testNotify() {
      const res = await fetch('/api/test-notify', { method: 'POST' });
      const data = await res.json();
      toast(data.ok ? '测试通知已发送' : '通知失败: ' + (data.stderr || ''));
    }

    async function refreshStatus() {
      const res = await fetch('/api/status');
      const data = await res.json();
      document.getElementById('stdout_log').textContent = data.stdout;
      document.getElementById('stderr_log').textContent = data.stderr;
    }

    renderSchedule();
  </script>
</body>
</html>
