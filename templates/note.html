<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>{{ title }} · Zotero 简报</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 760px; margin: 0 auto; padding: 28px 20px 48px; color: #1d1d1f; background: #f5f5f7; }
    .card { background: #fff; border-radius: 14px; padding: 24px 28px; box-shadow: 0 2px 16px rgba(0,0,0,.06); }
    h1 { margin: 0 0 12px; font-size: 1.35rem; line-height: 1.35; }
    .brief { background: #f0f7ff; border-left: 4px solid #007aff; padding: 12px 14px; border-radius: 8px; margin-bottom: 18px; }
    .actions { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .btn { display: inline-block; padding: 9px 14px; border-radius: 10px; text-decoration: none; font-weight: 600; font-size: 13px; background: #e8e8ed; color: #1d1d1f; }
    .content { line-height: 1.65; font-size: 14px; }
    .content a { color: #007aff; }
    .content h2 { font-size: 1rem; margin: 20px 0 8px; }
    .content h3 { font-size: 0.95rem; margin: 14px 0 6px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>{{ title }}</h1>
    <div class="brief">{{ briefing }}</div>
    <div class="actions">
      <a class="btn" href="{{ zotero_url }}">Zotero 原文</a>
      <a class="btn" href="{{ hub_url }}">HTML 中转页</a>
      <a class="btn" href="/">返回应用</a>
    </div>
    <div class="content">{{ html_body | safe }}</div>
  </div>
</body>
</html>
