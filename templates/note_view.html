<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} · 文献简报</title>
  <link rel="stylesheet" href="{{ static_base }}/note-view.css">
  <link rel="stylesheet" href="{{ static_base }}/katex/katex.min.css">
</head>
<body class="note-page">
  <div class="card">
    <h1>{{ title }}</h1>
    {% if viewer == 'standalone' %}
    <div class="page-actions">
      <a href="/">返回应用</a>
    </div>
    {% endif %}
    <div
      id="note-view-root"
      class="note-view-root"
      data-autoinit="1"
      data-viewer="{{ viewer }}"
      data-api-base="{{ api_base }}"
      data-note='{{ note_data | tojson }}'
    >
      {% include "note_view_body.html" %}
    </div>
  </div>
  {% if viewer == 'hub' %}
  <script>
  (function () {
    function digestAppActivateUrl(url) {
      if (!url) return url;
      if (/[?&]activate=(?:1|true|yes)/i.test(url)) return url;
      return url + (url.indexOf('?') >= 0 ? '&' : '?') + 'activate=1';
    }
    function bindDigestAppInline() {
      var el = document.querySelector('[data-role="digest-app"]');
      if (!el || el.dataset.hubInlineBound === '1') return;
      el.dataset.hubInlineBound = '1';
      el.addEventListener('click', function (e) {
        e.preventDefault();
        var url = el.getAttribute('href');
        if (!url) return;
        var root = document.getElementById('note-view-root');
        var apiBase = root && root.dataset.apiBase;
        var noteId = '';
        if (root) {
          try {
            noteId = JSON.parse(root.dataset.note || '{}').id || '';
          } catch (_) {}
        }
        var opened = false;
        var hintTimer = setTimeout(function () {
          if (!opened) {
            alert('若简报未启动，请运行 ./build_app.sh 重新注册深链接（避免误路由到 Zotero Digest Link_new）。');
          }
        }, 2500);
        function goDeeplink() {
          opened = true;
          clearTimeout(hintTimer);
          window.location.href = digestAppActivateUrl(url);
        }
        if (apiBase && noteId && typeof fetch === 'function') {
          fetch(apiBase + '/api/open-digest-app', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ note_id: noteId }),
          })
            .then(function (res) {
              if (res.ok) {
                opened = true;
                clearTimeout(hintTimer);
                return;
              }
              goDeeplink();
            })
            .catch(goDeeplink);
          return;
        }
        goDeeplink();
      });
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', bindDigestAppInline);
    } else {
      bindDigestAppInline();
    }
  })();
  </script>
  {% endif %}
  <script src="{{ static_base }}/note-view.js"></script>
  <script>
    if (typeof initNoteView === 'function') {
      initNoteView(document.getElementById('note-view-root'));
    }
  </script>
</body>
</html>
