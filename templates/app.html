<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zotero 简报</title>
  <style>
    :root {
      --bg: #f5f5f7; --sidebar: #fff; --card: #fff; --accent: #007aff;
      --border: #e5e5ea; --text: #1d1d1f; --muted: #86868b; --hover: #f2f2f7;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; background: var(--sidebar); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .topbar h1 { margin: 0; font-size: 1.1rem; font-weight: 700; }
    .tabs { display: flex; gap: 4px; background: var(--hover); padding: 4px; border-radius: 10px; }
    .tab { border: none; background: transparent; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--muted); }
    .tab.active { background: #fff; color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .top-actions { display: flex; gap: 8px; }
    .layout { flex: 1; display: flex; overflow: hidden; }
    .panel { display: none; flex: 1; overflow: hidden; }
    .panel.active { display: flex; }

    /* 笔记库 */
    .notes-layout { width: 100%; display: grid; grid-template-columns: 220px 340px 1fr; }
    .date-sidebar { border-right: 1px solid var(--border); background: var(--sidebar); overflow-y: auto; padding: 12px 8px; }
    .date-item { padding: 10px 12px; border-radius: 10px; cursor: pointer; font-size: 13px; margin-bottom: 4px; }
    .date-item:hover { background: var(--hover); }
    .date-item.active { background: #e8f2ff; color: var(--accent); font-weight: 600; }
    .date-item .count { float: right; color: var(--muted); font-size: 12px; }
    .note-list { border-right: 1px solid var(--border); background: #fafafa; overflow-y: auto; }
    .note-card { padding: 14px 16px; border-bottom: 1px solid var(--border); cursor: pointer; }
    .note-card:hover { background: #fff; }
    .note-card.active { background: #fff; border-left: 3px solid var(--accent); }
    .note-card h3 { margin: 0 0 6px; font-size: 14px; line-height: 1.35; }
    .note-card p { margin: 0; font-size: 12px; color: var(--muted); line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .note-detail { overflow-y: auto; padding: 24px 28px 40px; background: #fff; }
    .note-detail.empty { display: flex; align-items: center; justify-content: center; color: var(--muted); }
    .note-detail .brief { background: #f0f7ff; border-left: 4px solid var(--accent); padding: 12px 14px; border-radius: 8px; margin-bottom: 20px; line-height: 1.55; font-size: 14px; }
    .note-detail .meta { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
    .note-detail .content { line-height: 1.65; font-size: 14px; }
    .note-detail .content h2 { font-size: 1rem; margin: 22px 0 8px; }
    .note-detail .content h3 { font-size: 0.95rem; margin: 16px 0 6px; }
    .note-detail .content a { color: var(--accent); }
    .note-detail .content blockquote { margin: 0; }

    /* 设置 & 操作 */
    .scroll-panel { flex: 1; overflow-y: auto; padding: 20px; max-width: 900px; margin: 0 auto; width: 100%; }
    .card { background: var(--card); border-radius: 14px; padding: 20px 22px; margin-bottom: 16px; box-shadow: 0 1px 8px rgba(0,0,0,.04); }
    h2 { margin: 0 0 14px; font-size: 1rem; }
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    input, textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; font-family: inherit; }
    textarea { min-height: 220px; resize: vertical; line-height: 1.5; font-family: ui-monospace, Menlo, monospace; font-size: 13px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .row-3 { grid-template-columns: 1fr 1fr 1fr; }
    button { border: none; border-radius: 10px; padding: 9px 14px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: #e8e8ed; color: var(--text); }
    .btn-danger { background: #ff3b30; color: #fff; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .status { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
    .status.ok { background: #d1fae5; color: #065f46; }
    .status.bad { background: #fee2e2; color: #991b1b; }
    .schedule-list { display: flex; flex-direction: column; gap: 8px; }
    .schedule-item { display: flex; gap: 8px; align-items: center; }
    .schedule-item input { width: 80px; }
    .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
    pre { background: #1e1e1e; color: #d4d4d4; padding: 12px; border-radius: 10px; font-size: 12px; overflow: auto; max-height: 200px; white-space: pre-wrap; }
    #toast { position: fixed; bottom: 24px; right: 24px; background: #1d1d1f; color: #fff; padding: 12px 18px; border-radius: 10px; display: none; font-size: 14px; z-index: 99; }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>📚 Zotero 简报</h1>
    <div class="tabs">
      <button class="tab active" data-panel="notes">笔记库</button>
      <button class="tab" data-panel="settings">设置</button>
      <button class="tab" data-panel="actions">推送 & 日志</button>
    </div>
    <div class="top-actions">
      <button class="btn-primary" onclick="runNow(false)">立即推送</button>
    </div>
  </div>

  <div class="layout">
    <!-- 笔记库 -->
    <div id="panel-notes" class="panel active notes-layout">
      <div class="date-sidebar" id="date_sidebar"></div>
      <div class="note-list" id="note_list"></div>
      <div class="note-detail empty" id="note_detail">← 选择日期和笔记查看详情</div>
    </div>

    <!-- 设置 -->
    <div id="panel-settings" class="panel">
      <div class="scroll-panel">
        <div class="card">
          <h2>基本设置</h2>
          <div class="row row-3">
            <div><label>优先标签</label><input id="priority_tag" value="{{ config.priority_tag }}"></div>
            <div><label>每次推送篇数</label><input id="count" type="number" min="1" max="10" value="{{ config.count }}"></div>
            <div><label>去重天数</label><input id="history_days" type="number" min="1" max="90" value="{{ config.history_days }}"></div>
          </div>
          <div class="row">
            <div>
              <label>Markdown 总结路径</label>
              <input id="summaries_dir" value="{{ config.summaries_dir }}">
              <div class="hint">相对项目目录或绝对路径</div>
            </div>
            <div>
              <label>HTML 中转页路径</label>
              <input id="hubs_dir" value="{{ config.hubs_dir }}">
            </div>
          </div>
        </div>
        <div class="card">
          <h2>发送时间</h2>
          <div id="schedule_list" class="schedule-list"></div>
          <div class="actions"><button class="btn-secondary" onclick="addSchedule()">+ 添加时间</button></div>
        </div>
        <div class="card">
          <h2>详细总结 Prompt</h2>
          <label>DeepSeek 模型</label>
          <input id="deepseek_model" value="{{ config.deepseek_model }}" style="margin-bottom:12px">
          <label>Prompt（须含 <code>{context}</code>，输出 JSON）</label>
          <textarea id="summary_prompt">{{ config.summary_prompt }}</textarea>
        </div>
        <div class="card">
          <div class="actions">
            <button class="btn-primary" onclick="saveConfig()">保存配置</button>
            <button class="btn-secondary" onclick="reloadSchedule()">重载定时任务</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 推送 & 日志 -->
    <div id="panel-actions" class="panel">
      <div class="scroll-panel">
        <div class="card">
          <h2>状态</h2>
          <p>定时任务：{% if launchd_loaded %}<span class="status ok">已加载</span>{% else %}<span class="status bad">未加载</span>{% endif %}</p>
          <div class="actions">
            <button class="btn-secondary" onclick="refreshStatus()">刷新</button>
            <button class="btn-secondary" onclick="testNotify()">测试通知</button>
            <button class="btn-primary" onclick="runNow(false)">立即推送</button>
            <button class="btn-danger" onclick="runNow(true)">强制推送</button>
          </div>
        </div>
        <div class="card">
          <h2>运行日志</h2>
          <label>stdout</label><pre id="stdout_log">加载中…</pre>
          <label>stderr</label><pre id="stderr_log">加载中…</pre>
        </div>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const initialSchedule = {{ config.schedule | tojson }};
    let allGroups = [];
    let selectedDate = null;
    let selectedNoteId = null;

    // Tab 切换
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
        if (tab.dataset.panel === 'notes') loadNotes();
        if (tab.dataset.panel === 'actions') refreshStatus();
      });
    });

    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 3000);
    }

    async function loadNotes() {
      const res = await fetch('/api/notes');
      const data = await res.json();
      allGroups = data.groups || [];
      renderDateSidebar();
      if (!selectedDate && allGroups.length) {
        selectedDate = allGroups[0].date;
      }
      renderNoteList();
    }

    function renderDateSidebar() {
      const el = document.getElementById('date_sidebar');
      if (!allGroups.length) {
        el.innerHTML = '<div class="hint" style="padding:12px">暂无笔记</div>';
        return;
      }
      el.innerHTML = '<div class="date-item' + (!selectedDate ? ' active' : '') + '" onclick="selectDate(null)">全部 <span class="count">' +
        allGroups.reduce((s,g) => s + g.notes.length, 0) + '</span></div>';
      allGroups.forEach(g => {
        el.innerHTML += `<div class="date-item${selectedDate === g.date ? ' active' : ''}" onclick="selectDate('${g.date}')">
          ${g.date_label.split(' ')[0]}<span class="count">${g.notes.length}</span></div>`;
      });
    }

    function selectDate(date) {
      selectedDate = date;
      selectedNoteId = null;
      renderDateSidebar();
      renderNoteList();
      document.getElementById('note_detail').className = 'note-detail empty';
      document.getElementById('note_detail').innerHTML = '← 选择笔记查看详情';
    }

    function renderNoteList() {
      const el = document.getElementById('note_list');
      let notes = [];
      if (selectedDate) {
        const g = allGroups.find(x => x.date === selectedDate);
        notes = g ? g.notes : [];
      } else {
        allGroups.forEach(g => notes.push(...g.notes));
      }
      if (!notes.length) {
        el.innerHTML = '<div class="hint" style="padding:16px">该日期无笔记</div>';
        return;
      }
      el.innerHTML = notes.map(n => `
        <div class="note-card${selectedNoteId === n.id ? ' active' : ''}" onclick="openNote('${n.id}')">
          <h3>${esc(n.title)}</h3>
          <p>${esc(n.briefing || '（无简报）')}</p>
        </div>`).join('');
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
    }

    async function openNote(id) {
      selectedNoteId = id;
      renderNoteList();
      const res = await fetch('/api/notes/' + encodeURIComponent(id));
      const n = await res.json();
      if (n.error) { toast(n.error); return; }
      const el = document.getElementById('note_detail');
      el.className = 'note-detail';
      el.innerHTML = `
        <h1 style="margin:0 0 12px;font-size:1.35rem;line-height:1.35">${esc(n.title)}</h1>
        <div class="brief">${esc(n.briefing)}</div>
        <div class="meta">
          <a href="${n.zotero_url}"><button class="btn-secondary">Zotero 原文</button></a>
          ${n.hub_path ? `<a href="/hub/${encodeURIComponent(n.id)}" target="_blank"><button class="btn-secondary">HTML 中转页</button></a>` : ''}
        </div>
        <div class="content">${n.html}</div>`;
    }

    // 设置
    function renderSchedule() {
      const list = document.getElementById('schedule_list');
      list.innerHTML = '';
      initialSchedule.forEach((slot, i) => {
        const div = document.createElement('div');
        div.className = 'schedule-item';
        div.innerHTML = `<input type="number" min="0" max="23" value="${slot.hour}" data-i="${i}" data-f="hour" class="sched-input"> :
          <input type="number" min="0" max="59" value="${String(slot.minute).padStart(2,'0')}" data-i="${i}" data-f="minute" class="sched-input">
          <button class="btn-secondary" onclick="removeSchedule(${i})">删除</button>`;
        list.appendChild(div);
      });
      document.querySelectorAll('.sched-input').forEach(inp => {
        inp.addEventListener('change', e => {
          initialSchedule[+e.target.dataset.i][e.target.dataset.f] = +e.target.value;
        });
      });
    }
    function addSchedule() { initialSchedule.push({ hour: 9, minute: 0 }); renderSchedule(); }
    function removeSchedule(i) { initialSchedule.splice(i, 1); renderSchedule(); }

    function gatherConfig() {
      return {
        priority_tag: document.getElementById('priority_tag').value,
        count: +document.getElementById('count').value,
        history_days: +document.getElementById('history_days').value,
        summaries_dir: document.getElementById('summaries_dir').value,
        hubs_dir: document.getElementById('hubs_dir').value,
        schedule: initialSchedule,
        summary_prompt: document.getElementById('summary_prompt').value,
        deepseek_model: document.getElementById('deepseek_model').value,
      };
    }

    async function saveConfig() {
      const res = await fetch('/api/config', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(gatherConfig()) });
      const data = await res.json();
      toast(data.message || '已保存');
    }

    async function reloadSchedule() {
      await saveConfig();
      const res = await fetch('/api/reload-schedule', { method: 'POST' });
      const data = await res.json();
      toast(data.message);
    }

    async function runNow(force) {
      toast(force ? '强制推送中…' : '推送中…');
      const res = await fetch('/api/run', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ force }) });
      const data = await res.json();
      toast(data.ok ? '推送完成' : '推送失败');
      if (data.ok) loadNotes();
      refreshStatus();
    }

    async function testNotify() {
      const res = await fetch('/api/test-notify', { method: 'POST' });
      const data = await res.json();
      toast(data.ok ? '测试通知已发送' : '通知失败');
    }

    async function refreshStatus() {
      const res = await fetch('/api/status');
      const data = await res.json();
      document.getElementById('stdout_log').textContent = data.stdout;
      document.getElementById('stderr_log').textContent = data.stderr;
    }

    renderSchedule();
    loadNotes();
  </script>
</body>
</html>
