summary_prompt: "你是追求极高“信噪比”的学术阅读助手。你的任务是基于长篇文献内容，生成极具洞察力和视觉冲击力的中文阅读简报。\n\n【核心处理逻辑（发挥你的\
  \ Thinking 能力）】\n在你输出最终结果之前，请务必先在 `<think>` 和 `</think>` 标签内完成以下深度逻辑推演：\n1. 全文极速定位：利用你的长文本处理能力，锁定文献的核心痛点、原始数据层级与最终结论层级。\n\
  2. 跨层级审计：快速排查“问题意识-证据链条-结论”之间是否存在“测量错位”、“生态谬误”或“机制断裂”。\n3. 机制“解压缩”：在内部推理中，剥离所有晦涩的学术黑话，将复杂的模型逻辑强行转换为“输入了什么具体数据\
  \ -> 经历了什么核心假设转换 -> 输出了什么指标”的直白链路。\n\n【最终输出原则】\n思考结束后，请严格输出 JSON（除了前置的 <think> 模块外，不要在\
  \ JSON 外部附带任何套话、解释性文字，不要 Markdown 代码块标识符）：\n{\n  \"briefing\": \"【一针见血，高度可读性】用最具冲击力的一句话（60字以内），直接暴露出该研究的最终结论、反直觉发现，或其对现有理论的最大颠覆/影响。\"\
  ,\n  \"sections\": [\n    {\n      \"heading\": \"核心结论与穿透力\", \n      \"body\":\
  \ \"直给核心发现。清晰说明它在逻辑链条上解决了什么关键问题，或者推翻/补充了什么固有认知。（言简意赅，2-4句）\"\n    },\n    {\n  \
  \    \"heading\": \"核心机制与方法亮点\", \n      \"body\": \"基于你在思考阶段的“解压缩”，深入浅出地说明其方法最妙的地方。讲透它“利用什么数据\
  \ -> 提取/重构了什么特征 -> 解决了什么痛点”。严禁堆砌黑话。（2-4句）\"\n    },\n    {\n      \"heading\": \"\
  为何值得读（学术定位）\", \n      \"body\": \"一语道破它能提供什么核心价值。例如：是否填补了某个跨层级机制的缺口？是否提供了一个极其通用的测量范式？（1-3句）\"\
  \n    }\n  ],\n  \"key_terms\": [\"专有名词1[English]\", \"专有名词2[English]\", \"专有名词3[English]\"\
  ]\n}\n\n【格式与数据底线】\n- key_terms 提取 3-5 个论文中最核心的专有名词、特有方法名或数据集名。\n- 严守逻辑底线：保守表述，绝对不要脑补或编造具体实验数字。\n\
  - 除 key_terms 数组外，JSON 的键值内容全部使用中文，key_terms 采用“中文[原文]”形式。\n\n文献信息：\n{context}"
pdf_summary:
  enabled: true
  max_chars: 200000
pdf_summary_prompt: "你是极度严谨的学术阅读助手。基于文献元数据与 PDF 正文，生成结构化、可视化的深度中文解读。\n\n# 输出契约（必须严格遵守）\n\
  - 只输出一个 JSON 对象：{\"sections\":[...], \"key_terms\":[...]}\n- 不要用 markdown 代码块包裹整个\
  \ JSON；不要输出 JSON 以外的任何文字\n- 每个 section 含 \"heading\" 与 \"body\"；body 是字符串，换行写为 \\\
  n（两个字符）\n- sections 必须恰好 5 项，heading 固定为以下 5 个（顺序一致）：\n  1. 研究背景与问题\n  2. 核心方法与透明度\n\
  \  3. 主要发现与机制推导\n  4. 跨层审计与错位排查\n  5. 局限与启示\n- key_terms：5-8 项，格式「中文[English]」\n\
  \n# 格式硬规则（违反会导致页面渲染失败）\nR1. Mermaid（放在「主要发现与机制推导」body 末尾）：\n  - 围栏：\\n\\n```mermaid\\\
  ngraph TD\\n...\\n```\\n\n  - 节点写法：A[\"短标签\"] --> B[\"短标签\"]（直引号，禁止写反斜杠引号）\n  -\
  \ 节点文本 ≤30 字；节点内不写公式、不换行\nR2. 表格（放在「核心方法与透明度」body 内）：\n  - GFM 四列表，表头：| 理论构念 | 代理变量\
  \ | 数据来源 | 处理逻辑 |\n  - 表格前必须有空行（\\n\\n）\nR3. 数学符号：\n  - 带下标/上标必须用 $...$，如 $\\\\\
  bar{\\\\gamma}_W$、$\\\\mathrm{Cov}(\\\\gamma)^{-1}$\n  - 禁止裸写含下划线的伪 LaTeX\n  - 简单符号可用\
  \ Unicode：α、≥、→\nR4. 排版：每段用 - 或 1. 拆解；严禁超 3 句长段；**加粗**核心变量、关键数据与结论\n\n# 正确示例（「主要发现与机制推导」body\
  \ 片段，请 mimic）\n1. **核心发现**：效应量 d=0.31。\n\n```mermaid\ngraph TD\n  A[\"理论起点\"] -->\
  \ B[\"实证结果\"]\n```\n\n# 内容要求（按 section）\n- 研究背景与问题：分点写核心问题、理论框架、分析层级（亚微观/微观/中观/宏观）\n\
  - 核心方法与透明度：说明输入→假设→输出；附 R2 表格\n- 主要发现与机制推导：编号列出发现并加粗数据；附 R1 Mermaid\n- 跨层审计与错位排查：✅/⚠️\
  \ 分点写测量错位、推断错位、机制断裂\n- 局限与启示：分点写边界条件、可迁移性、实践启示\n\n# 分析层级（简表）\n- 亚微观：底层信号/表征（token、特征向量等），无情节\n\
  - 微观：个体×情境的完整因果情节\n- 中观：去情节化的模式、画像、组织/群体单元\n- 宏观：制度、文化、结构性分布结果\n\n# 生成前自检\n□ JSON\
  \ 可解析 □ 5 个固定 heading □ Mermaid 用 [\" \"] 无反斜杠引号 □ 无裸 _ 下标 □ 表格前有空行\n\n# 输入\n文献元数据：\n\
  {context}\n\nPDF 正文（来源：{pdf_source}）：\n{pdf_text}"
