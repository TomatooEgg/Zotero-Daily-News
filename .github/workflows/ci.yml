name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      PYTHONPATH: ${{ github.workspace }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest
      - name: Run tests
        run: pytest -q

  windows-artifacts:
    name: Windows MSI and portable ZIP
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build Windows artifacts
        shell: pwsh
        run: .\build_windows.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: |
            dist/Zotero-Daily-News-Windows-x86_64.msi
            dist/Zotero-Daily-News-Windows-x86_64-Portable.zip

  macos-artifacts:
    name: macOS DMG
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build macOS DMG
        run: bash build_dmg.sh
      - name: Verify macOS DMG
        run: |
          DMG="$(ls dist/Zotero-Daily-News-macOS-*.dmg | head -n 1)"
          hdiutil verify "$DMG"
          MOUNT_DIR="$(mktemp -d)"
          hdiutil attach "$DMG" -mountpoint "$MOUNT_DIR" -nobrowse -quiet
          trap 'hdiutil detach "$MOUNT_DIR" -quiet || true' EXIT
          APP_PATH="$MOUNT_DIR/Zotero 简报.app"
          test -d "$APP_PATH"
          test -x "$APP_PATH/Contents/MacOS/launcher"
          test -x "$APP_PATH/Contents/Resources/runtime/launcher"
          test ! -d "$APP_PATH/Contents/Resources/app/.venv"
          BROKEN_LINK="$(find "$APP_PATH" -type l ! -exec test -e {} \; -print -quit)"
          if [ -n "$BROKEN_LINK" ]; then
            echo "Broken symlink in app bundle: $BROKEN_LINK" >&2
            exit 1
          fi
          "$APP_PATH/Contents/MacOS/launcher" --help >/tmp/zotero-daily-news-help.txt
          grep -q "Zotero" /tmp/zotero-daily-news-help.txt
          "$APP_PATH/Contents/MacOS/launcher" --smoke-test
          hdiutil detach "$MOUNT_DIR" -quiet
          trap - EXIT
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/Zotero-Daily-News-macOS-*.dmg

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - windows-artifacts
      - macos-artifacts
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mapfile -t assets < <(find release-assets -type f \( -name '*.msi' -o -name '*.zip' -o -name '*.dmg' \) | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found" >&2
            exit 1
          fi

          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG_NAME" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --title "$TAG_NAME" --generate-notes
          fi
