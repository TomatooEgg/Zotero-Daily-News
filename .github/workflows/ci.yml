name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      PYTHONPATH: ${{ github.workspace }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest
      - name: Run tests
        run: pytest -q

  windows-artifacts:
    name: Windows MSI and portable ZIP
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build Windows artifacts
        shell: pwsh
        run: .\build_windows.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: |
            dist/Zotero-Daily-News-Windows-x86_64.msi
            dist/Zotero-Daily-News-Windows-x86_64-Portable.zip

  macos-artifacts:
    name: macOS DMG
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build macOS DMG
        run: bash build_dmg.sh
      - name: Verify macOS DMG
        run: |
          DMG="$(ls dist/Zotero-Daily-News-macOS-*.dmg | head -n 1)"
          hdiutil verify "$DMG"
          MOUNT_DIR="$(mktemp -d)"
          hdiutil attach "$DMG" -mountpoint "$MOUNT_DIR" -nobrowse -quiet
          test -d "$MOUNT_DIR/Zotero 简报.app"
          test -x "$MOUNT_DIR/Zotero 简报.app/Contents/MacOS/launcher"
          hdiutil detach "$MOUNT_DIR" -quiet
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/Zotero-Daily-News-macOS-*.dmg
